# secretary skill の設定例
# Cosenseの日付ページからタスクを読み取り、秘書的にサポートするスキル

# 使い方:
#   npx skills add kinjo1130/kinjo1130-skills --skill secretary
#
# 呼び出し例:
#   「秘書」「今何する？」「ブリーフィング」「進捗どう？」「振り返り」

# Cosenseスクリプトのパス（環境に合わせて変更）
cosense:
  script_path: "/path/to/.claude/skills/cosense/scripts/cosense_api.sh"

# 日付ページのフォーマット
daily_page:
  # ページタイトルの日付形式
  # 月: ゼロパディングなし、日: ゼロパディングあり
  format: "YYYY/M/DD"
  sections:
    - "やること"
    - "やったこと"
    - "感想"
    - "メモ"

# タイムブロックの設定例
timeblocks:
  # 完了マーク
  done_marker: "done"
  # 低優先度ラベル
  low_priority_labels:
    - "余裕があれば"

# GitHub連携（任意）
github:
  repos:
    - "owner/repo-name"
  # 優先度ラベル
  priority_labels:
    must: "priority/MUST"
    should: "priority/SHOULD"
    may: "priority/MAY"

# Notion連携（任意）
# Notion MCPが接続されている場合に自動で利用
